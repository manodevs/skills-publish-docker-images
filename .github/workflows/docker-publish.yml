name: Docker Publish
on:
  push:
    branches:
      - main
permissions: 
  contents: read
  packages: write
jobs:
   build:
     runs-on: ubuntu-latest
     steps:
       - name: Git Checkout
         uses: actions/checkout@v7.0.0
       - name: Docker Login
         uses: docker/login-action@v4.2.0
         with:
           username: ${{ github.actor }}
           password: ${{ secrets.GITHUB_TOKEN }}
           registry: ghcr.io
       - name: setup QEMU
         uses: docker/setup-qemu-action@v4.1.0
       - name: dockerx
         uses: docker/setup-buildx-action@v4.1.0
       - name: Build and Push
         uses: docker/build-push-action@v7.2.0
         with:
           context: .
           platforms: linux/arm64, linux/amd64
           push: true
           tags: |
              ghcr.io/manodevs/skills-publish-docker-images/stackoverflown:latest
              ghcr.io/manodevs/skills-publish-docker-images/stackoverflown:main
        
     
