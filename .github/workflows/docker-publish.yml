name: Docker Publish
on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:
permissions: 
  contents: read
  packages: write
jobs:
   build:
     runs-on: ubuntu-latest
     steps:
       - name: Git Checkout
         uses: actions/checkout@v7.0.0
       - name: Docker Login
         uses: docker/login-action@v4.2.0
         with:
           username: ${{ github.actor }}
           password: ${{ secrets.GITHUB_TOKEN }}
           registry: ghcr.io
       - name: setup QEMU
         uses: docker/setup-qemu-action@v4.1.0
       - name: dockerx
         uses: docker/setup-buildx-action@v4.1.0
       - name: Apply MetaTag
         id: meta
         uses: docker/metadata-action@v6.1.0
         with:
            images: |
               ghcr.io/manodevs/skills-publish-docker-images/stackoverflown
       - name: Build and Push
         uses: docker/build-push-action@v7.2.0
         with:
           context: .
           platforms: linux/arm64, linux/amd64
           push: true
           tags: |
               ${{ steps.meta.outputs.tags }}
        
     
